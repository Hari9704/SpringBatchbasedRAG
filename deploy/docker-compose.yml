# Cost-effective single-host stack: one VM or laptop, Docker Compose.
# Usage:
#   cd deploy
#   copy .env.example .env   # then set GEMINI_API_KEY when ready
#   docker compose up --build -d
# UI: http://localhost  |  API (optional): http://localhost:8080
#
# Data: uploads + vector index live in volume docintell-data (shared by document, batch, query).

services:
  auth-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring
      args:
        SERVICE: auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-please-change-me-for-any-public-deployment}
      DOCINTELL_CORS_ALLOWED_ORIGINS: "*"
    expose:
      - "8081"

  document-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring
      args:
        SERVICE: document-service
    environment:
      DOCINTELL_UPLOAD_STORAGE_PATH: /data/uploads
      DOCINTELL_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - docintell-data:/data
    expose:
      - "8082"

  batch-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring
      args:
        SERVICE: batch-service
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DOCINTELL_SERVICES_DOCUMENT_SERVICE_URL: http://document-service:8082
      DOCINTELL_VECTORSTORE_PATH: /data/vectors.json
      DOCINTELL_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - docintell-data:/data
    depends_on:
      - document-service
    expose:
      - "8083"

  query-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring
      args:
        SERVICE: query-service
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DOCINTELL_VECTORSTORE_PATH: /data/vectors.json
      DOCINTELL_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - docintell-data:/data
    expose:
      - "8085"

  feedback-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring
      args:
        SERVICE: feedback-service
    environment:
      DOCINTELL_CORS_ALLOWED_ORIGINS: "*"
    expose:
      - "8086"

  analytics-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring
      args:
        SERVICE: analytics-service
    environment:
      DOCINTELL_CORS_ALLOWED_ORIGINS: "*"
    expose:
      - "8087"

  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring
      args:
        SERVICE: api-gateway
    environment:
      DOCINTELL_SVC_AUTH: http://auth-service:8081
      DOCINTELL_SVC_DOCUMENT: http://document-service:8082
      DOCINTELL_SVC_BATCH: http://batch-service:8083
      DOCINTELL_SVC_QUERY: http://query-service:8085
      DOCINTELL_SVC_FEEDBACK: http://feedback-service:8086
      DOCINTELL_SVC_ANALYTICS: http://analytics-service:8087
      DOCINTELL_GATEWAY_CORS_PATTERN: "*"
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - document-service
      - batch-service
      - query-service
      - feedback-service
      - analytics-service

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  docintell-data:
