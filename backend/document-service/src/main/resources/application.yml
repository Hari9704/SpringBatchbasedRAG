server:
  port: 8082
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:h2:mem:docdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

docintell:
  upload:
    max-file-size: 52428800
    allowed-types: pdf,docx,txt
    storage-path: ${DOCINTELL_UPLOAD_STORAGE_PATH:./data/uploads}
  cors:
    allowed-origins: ${DOCINTELL_CORS_ALLOWED_ORIGINS:http://localhost:5173}
