server:
  port: 8085

spring:
  application:
    name: query-service
  datasource:
    url: jdbc:h2:mem:querydb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:paste_your_key_here}

docintell:
  rag:
    top-k: 5
    similarity-threshold: 0.7
    max-context-tokens: 4096
  cors:
    allowed-origins: http://localhost:5173
