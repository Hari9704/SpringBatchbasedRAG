server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: document-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/documents/**
        - id: batch-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/batch/**
        - id: query-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/query/**
        - id: feedback-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/feedback/**
        - id: analytics-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/analytics/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
