server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${DOCINTELL_SVC_AUTH:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: document-service
          uri: ${DOCINTELL_SVC_DOCUMENT:http://localhost:8082}
          predicates:
            - Path=/api/documents/**
        - id: batch-service
          uri: ${DOCINTELL_SVC_BATCH:http://localhost:8083}
          predicates:
            - Path=/api/batch/**
        - id: query-service
          uri: ${DOCINTELL_SVC_QUERY:http://localhost:8085}
          predicates:
            - Path=/api/query/**
        - id: feedback-service
          uri: ${DOCINTELL_SVC_FEEDBACK:http://localhost:8086}
          predicates:
            - Path=/api/feedback/**
        - id: analytics-service
          uri: ${DOCINTELL_SVC_ANALYTICS:http://localhost:8087}
          predicates:
            - Path=/api/analytics/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: ${DOCINTELL_GATEWAY_CORS_PATTERN:http://localhost:5173}
            allowedMethods: "*"
            allowedHeaders: "*"
