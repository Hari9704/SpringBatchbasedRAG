server:
  port: 8086

spring:
  application:
    name: feedback-service
  datasource:
    url: jdbc:h2:mem:feedbackdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

docintell:
  cors:
    allowed-origins: ${DOCINTELL_CORS_ALLOWED_ORIGINS:http://localhost:5173}
